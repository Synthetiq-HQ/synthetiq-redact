085">£1k</text><line x1="95" y1="290.0" x2="995" y2="290.0" stroke="#e4e7ec"/><text x="83" y="295.0" text-anchor="end" font-family="Arial" font-size="12" fill="#667085">£2k</text><line x1="95" y1="200.0" x2="995" y2="200.0" stroke="#e4e7ec"/><text x="83" y="205.0" text-anchor="end" font-family="Arial" font-size="12" fill="#667085">£3k</text><line x1="95" y1="110.0" x2="995" y2="110.0" stroke="#e4e7ec"/><text x="83" y="115.0" text-anchor="end" font-family="Arial" font-size="12" fill="#667085">£4k</text><circle cx="455.0" cy="470.0" r="8.4" fill="#2457c5" opacity="0.86"/><text x="473.0" y="462.0" font-family="Arial" font-size="12" fill="#172033">Current demo</text><text x="473.0" y="477.0" font-family="Arial" font-size="12" fill="#172033">EasyOCR + rules</text><circle cx="255.0" cy="470.0" r="11.2" fill="#2d7a78" opacity="0.86"/><text x="273.0" y="462.0" font-family="Arial" font-size="12" fill="#172033">Add PP-OCRv5</text><text x="273.0" y="477.0" font-family="Arial" font-size="12" fill="#172033">specialist OCR</text><circle cx="455.0" cy="470.0" r="12.8" fill="#6f59c9" opacity="0.86"/><text x="473.0" y="462.0" font-family="Arial" font-size="12" fill="#172033">Qwen2.5-VL 3B</text><text x="473.0" y="477.0" font-family="Arial" font-size="12" fill="#172033">MLX on M4</text><circle cx="735.0" cy="389.0" r="14.0" fill="#b1579a" opacity="0.86"/><text x="753.0" y="381.0" font-family="Arial" font-size="12" fill="#172033">Qwen2.5-VL 7B</text><text x="753.0" y="396.0" font-family="Arial" font-size="12" fill="#172033">MLX / cheap GPU</text><circle cx="855.0" cy="389.0" r="13.2" fill="#c48b22" opacity="0.86"/><text x="873.0" y="381.0" font-family="Arial" font-size="12" fill="#172033">Gemma 3 4B/12B</text><text x="873.0" y="396.0" font-family="Arial" font-size="12" fill="#172033">local VLM option</text><circle cx="295.0" cy="155.0" r="14.4" fill="#447a2f" opacity="0.86"/><text x="313.0" y="147.0" font-family="Arial" font-size="12" fill="#172033">Batch workstation</text><text x="31